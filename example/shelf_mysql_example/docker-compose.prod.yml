services:
  mysql:
    image: mysql:8.0
    container_name: anaki_mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: anaki
      MYSQL_PASSWORD: anaki
      MYSQL_DATABASE: anaki_test
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'anaki', '-panaki']
      interval: 5s
      retries: 10

  app:
    build:
      context: ../../
      dockerfile: example/shelf_mysql_example/Dockerfile
    container_name: anaki_app
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      HOST: '0.0.0.0'
      PORT: '8080'
      DB_HOST: mysql
      DB_PORT: '3306'
      DB_USER: anaki
      DB_PASS: anaki
      DB_NAME: anaki_test
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysqldata:
