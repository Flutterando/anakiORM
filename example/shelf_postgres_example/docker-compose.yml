services:
  postgres:
    image: postgres:16-alpine
    container_name: anaki_postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: anaki
      POSTGRES_PASSWORD: anaki
      POSTGRES_DB: anaki_test
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
